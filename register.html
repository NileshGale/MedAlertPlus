<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Med-Alert-Plus | Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="auth-page">

    <div class="auth-wrapper">
        <div class="auth-left">
            <div class="brand">
                <h1>Med-Alert-Plus</h1>
                <p>Join the future of healthcare management</p>
            </div>
            <div class="illustration">
               <div class="glass-shape"></div>
            </div>
        </div>

        <div class="auth-right">
            <div class="auth-box glass-panel">
                <h2>Create Account</h2>
                <p class="subtitle">Choose your account type to continue</p>

                <div class="tabs">
                    <button class="tab-btn active" data-target="patient-form">Patient</button>
                    <button class="tab-btn" data-target="doctor-form">Doctor</button>
                </div>

                <div id="registerAlert" class="alert hidden"></div>

                <!-- Patient Register Form -->
                <form id="patient-form" class="auth-form active">
                    <input type="hidden" name="action" value="register">
                    <input type="hidden" name="role" value="patient">

                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" name="name" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" name="email" required placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" name="phone" required placeholder="+1 234 567 8900">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Register as Patient</button>
                </form>

                <!-- Doctor Register Form -->
                <form id="doctor-form" class="auth-form hidden">
                    <input type="hidden" name="action" value="register">
                    <input type="hidden" name="role" value="doctor">

                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" name="name" required placeholder="Dr. Jane Doe">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" name="email" required placeholder="doctor@example.com">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" name="phone" required placeholder="+1 234 567 8900">
                    </div>
                    <div class="form-group">
                        <label>Specialization</label>
                        <input type="text" name="specialization" required placeholder="Cardiologist">
                    </div>
                    <div class="form-group">
                        <label>License Number</label>
                        <input type="text" name="license" required placeholder="MED-12345">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Register as Doctor</button>
                </form>

                <!-- OTP Verification Modal / Section -->
                <div id="otp-section" class="hidden">
                    <h3>Verify Email</h3>
                    <p>Enter the 6-digit OTP sent to your email.</p>
                    <form id="otpForm">
                        <input type="hidden" name="action" value="verify_otp">
                        <input type="hidden" id="otp-email" name="email" value="">
                        
                        <div class="form-group">
                            <input type="text" name="otp" required placeholder="123456" maxlength="6" class="otp-input text-center">
                        </div>
                        <button type="submit" class="btn btn-success btn-block">Verify OTP</button>
                    </form>
                </div>

                <div class="form-footer">
                    <span>Already have an account?</span>
                    <a href="login.html">Sign In</a>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
